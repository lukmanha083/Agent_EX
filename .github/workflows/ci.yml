name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (OTP ${{ matrix.otp }} / Elixir ${{ matrix.elixir }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        otp: ["27.0"]
        elixir: ["1.18.3"]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: agent_ex
          POSTGRES_PASSWORD: agent_ex_dev
          POSTGRES_DB: agent_ex_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      MIX_ENV: test
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          elixir-version: ${{ matrix.elixir }}

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ matrix.otp }}-${{ matrix.elixir }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Setup database
        run: mix ecto.setup

      - name: Run tests
        run: mix test

  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    env:
      MIX_ENV: test
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27.0"
          elixir-version: "1.18.3"

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-27.0-1.18.3-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-27.0-1.18.3-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile

      - name: Check formatting
        run: mix format --check-formatted

      - name: Credo (strict)
        run: mix credo --strict

      - name: ExDNA clone detection
        # Non-blocking: ExDNA crashes on certain Elixir 1.18 AST patterns (atom_to_binary bug)
        continue-on-error: true
        run: mix ex_dna
