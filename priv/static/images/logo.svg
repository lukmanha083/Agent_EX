<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" fill="none">
  <defs>
    <!-- Primary gradient - deep space blue to electric cyan -->
    <linearGradient id="grad-main" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1B2A"/>
      <stop offset="50%" stop-color="#1B3A5C"/>
      <stop offset="100%" stop-color="#00D4FF"/>
    </linearGradient>

    <!-- Accent glow -->
    <linearGradient id="grad-glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#7B61FF"/>
    </linearGradient>

    <!-- Node gradient -->
    <radialGradient id="grad-node" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00F0FF"/>
      <stop offset="100%" stop-color="#0088CC"/>
    </radialGradient>

    <!-- Subtle glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <filter id="node-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ===== ICON MARK: Hexagonal agent network ===== -->
  <g transform="translate(120, 120)">

    <!-- Outer hexagon shell -->
    <polygon
      points="0,-85 73.6,-42.5 73.6,42.5 0,85 -73.6,42.5 -73.6,-42.5"
      fill="none"
      stroke="url(#grad-glow)"
      stroke-width="3.5"
      opacity="0.9"
    />

    <!-- Inner hexagon - rotated 30deg for depth -->
    <g transform="rotate(30)">
      <polygon
        points="0,-60 52,-30 52,30 0,60 -52,30 -52,-30"
        fill="none"
        stroke="url(#grad-glow)"
        stroke-width="2.5"
        opacity="0.6"
      />
    </g>

    <!-- Agent network connections (edges) -->
    <g stroke="#00D4FF" stroke-width="2.5" opacity="0.75" filter="url(#glow)">
      <!-- Central hub to outer nodes -->
      <line x1="0" y1="0" x2="0" y2="-52"/>
      <line x1="0" y1="0" x2="45" y2="-26"/>
      <line x1="0" y1="0" x2="45" y2="26"/>
      <line x1="0" y1="0" x2="0" y2="52"/>
      <line x1="0" y1="0" x2="-45" y2="26"/>
      <line x1="0" y1="0" x2="-45" y2="-26"/>

      <!-- Cross-connections between agents -->
      <line x1="0" y1="-52" x2="45" y2="-26"/>
      <line x1="45" y1="-26" x2="45" y2="26"/>
      <line x1="45" y1="26" x2="0" y2="52"/>
      <line x1="0" y1="52" x2="-45" y2="26"/>
      <line x1="-45" y1="26" x2="-45" y2="-26"/>
      <line x1="-45" y1="-26" x2="0" y2="-52"/>
    </g>

    <!-- Agent nodes (outer ring) -->
    <g filter="url(#node-glow)">
      <circle cx="0"   cy="-52" r="7" fill="url(#grad-node)"/>
      <circle cx="45"  cy="-26" r="7" fill="url(#grad-node)"/>
      <circle cx="45"  cy="26"  r="7" fill="url(#grad-node)"/>
      <circle cx="0"   cy="52"  r="7" fill="url(#grad-node)"/>
      <circle cx="-45" cy="26"  r="7" fill="url(#grad-node)"/>
      <circle cx="-45" cy="-26" r="7" fill="url(#grad-node)"/>
    </g>

    <!-- Central orchestrator node - larger, brighter -->
    <circle cx="0" cy="0" r="12" fill="#0D1B2A" stroke="#00D4FF" stroke-width="3" filter="url(#node-glow)"/>
    <circle cx="0" cy="0" r="5.5" fill="#00F0FF"/>

    <!-- Orbiting arc - suggests autonomy/motion -->
    <ellipse cx="0" cy="0" rx="72" ry="28"
      fill="none" stroke="url(#grad-glow)" stroke-width="2"
      stroke-dasharray="8 12"
      transform="rotate(-25)"
      opacity="0.65"
    />

  </g>

  <!-- ===== WORDMARK ===== -->
  <g transform="translate(230, 100)">

    <!-- AGENT -->
    <text
      font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
      font-size="72"
      font-weight="800"
      letter-spacing="8"
      fill="#E0E6ED"
      dominant-baseline="middle"
    >AGENT</text>

    <!-- Separator bar -->
    <rect x="332" y="-18" width="3" height="36" rx="1.5" fill="url(#grad-glow)" opacity="0.7"/>

    <!-- EX - accented -->
    <text
      x="348"
      font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
      font-size="72"
      font-weight="800"
      letter-spacing="8"
      fill="url(#grad-glow)"
      dominant-baseline="middle"
    >EX</text>

    <!-- Tagline -->
    <text
      y="44"
      font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
      font-size="16"
      font-weight="500"
      letter-spacing="7"
      fill="#8FAEC8"
      dominant-baseline="middle"
    >AGENTIC AI FRAMEWORK</text>

    <!-- Underline accent -->
    <rect y="60" width="440" height="1.5" fill="url(#grad-glow)" opacity="0.4"/>

  </g>

</svg>
