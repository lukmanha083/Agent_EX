<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="grad-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#7B61FF"/>
    </linearGradient>
    <radialGradient id="grad-node" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00F0FF"/>
      <stop offset="100%" stop-color="#0088CC"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="node-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g transform="translate(100, 100)">
    <!-- Outer hexagon -->
    <polygon
      points="0,-85 73.6,-42.5 73.6,42.5 0,85 -73.6,42.5 -73.6,-42.5"
      fill="none" stroke="url(#grad-glow)" stroke-width="3.5" opacity="0.9"
    />

    <!-- Inner rotated hexagon -->
    <g transform="rotate(30)">
      <polygon
        points="0,-60 52,-30 52,30 0,60 -52,30 -52,-30"
        fill="none" stroke="url(#grad-glow)" stroke-width="2.5" opacity="0.6"
      />
    </g>

    <!-- Network edges -->
    <g stroke="#00D4FF" stroke-width="2.5" opacity="0.75" filter="url(#glow)">
      <line x1="0" y1="0" x2="0" y2="-52"/>
      <line x1="0" y1="0" x2="45" y2="-26"/>
      <line x1="0" y1="0" x2="45" y2="26"/>
      <line x1="0" y1="0" x2="0" y2="52"/>
      <line x1="0" y1="0" x2="-45" y2="26"/>
      <line x1="0" y1="0" x2="-45" y2="-26"/>
      <line x1="0" y1="-52" x2="45" y2="-26"/>
      <line x1="45" y1="-26" x2="45" y2="26"/>
      <line x1="45" y1="26" x2="0" y2="52"/>
      <line x1="0" y1="52" x2="-45" y2="26"/>
      <line x1="-45" y1="26" x2="-45" y2="-26"/>
      <line x1="-45" y1="-26" x2="0" y2="-52"/>
    </g>

    <!-- Agent nodes -->
    <g filter="url(#node-glow)">
      <circle cx="0"   cy="-52" r="8" fill="url(#grad-node)"/>
      <circle cx="45"  cy="-26" r="8" fill="url(#grad-node)"/>
      <circle cx="45"  cy="26"  r="8" fill="url(#grad-node)"/>
      <circle cx="0"   cy="52"  r="8" fill="url(#grad-node)"/>
      <circle cx="-45" cy="26"  r="8" fill="url(#grad-node)"/>
      <circle cx="-45" cy="-26" r="8" fill="url(#grad-node)"/>
    </g>

    <!-- Central orchestrator -->
    <circle cx="0" cy="0" r="13" fill="#0D1B2A" stroke="#00D4FF" stroke-width="3.5" filter="url(#node-glow)"/>
    <circle cx="0" cy="0" r="6" fill="#00F0FF"/>

    <!-- Orbit arc -->
    <ellipse cx="0" cy="0" rx="72" ry="28"
      fill="none" stroke="url(#grad-glow)" stroke-width="2.5"
      stroke-dasharray="8 12" transform="rotate(-25)" opacity="0.65"
    />
  </g>
</svg>
